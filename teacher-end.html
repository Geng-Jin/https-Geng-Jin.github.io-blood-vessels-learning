<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师端 - 血流的管道血管互动学习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #333; line-height: 1.6; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header { text-align: center; margin-bottom: 40px; background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); }
        h1 { color: #667eea; font-size: 2.5em; margin-bottom: 10px; }
        .subtitle { color: #666; font-size: 1.2em; }
        .refresh-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px 30px; border-radius: 25px; cursor: pointer; font-size: 1em; margin-top: 15px; transition: transform 0.3s ease; }
        .refresh-btn:hover { transform: scale(1.05); }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1); }
        .stat-card h3 { color: #667eea; font-size: 2em; margin-bottom: 5px; }
        .section { background: rgba(255, 255, 255, 0.95); border-radius: 20px; padding: 30px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); }
        h2 { color: #667eea; margin-bottom: 20px; font-size: 1.8em; border-bottom: 3px solid #667eea; padding-bottom: 10px; }
        .filter-bar { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-bar select, .filter-bar input { padding: 10px 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 1em; }
        .filter-bar button { background: #667eea; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .data-card { background: #f8f9fa; border-radius: 15px; padding: 20px; border: 2px solid #ddd; transition: all 0.3s ease; }
        .data-card:hover { border-color: #667eea; transform: translateY(-5px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2); }
        .data-card .header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .data-card .group { font-weight: bold; font-size: 1.2em; color: #667eea; }
        .data-card .task-type { background: #667eea; color: white; padding: 5px 10px; border-radius: 15px; font-size: 0.8em; }
        .data-card .score { font-size: 2em; font-weight: bold; color: #764ba2; text-align: center; margin: 15px 0; }
        .data-card .time { color: #666; font-size: 0.9em; text-align: center; }
        .data-card img { max-width: 100%; max-height: 200px; border-radius: 10px; margin-top: 15px; cursor: pointer; }
        .answers-list { margin-top: 15px; padding: 10px; background: white; border-radius: 10px; }
        .answers-list p { margin: 5px 0; font-size: 0.9em; }
        .answers-list .correct { color: #4CAF50; } .answers-list .wrong { color: #f44336; }
        .loading, .empty, .error { text-align: center; padding: 40px; }
        .tab-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #ddd; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; }
        .tab-btn.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .tab-content { display: none; } .tab-content.active { display: block; }
        .bar-chart { display: flex; align-items: flex-end; justify-content: center; gap: 20px; height: 200px; padding: 20px; }
        .bar { width: 60px; background: linear-gradient(180deg, #667eea 0%, #764ba2 100%); border-radius: 10px 10px 0 0; position: relative; }
        .bar .value { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); font-weight: bold; color: #667eea; }
        .bar .label { position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%); font-size: 0.8em; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>教师端后台</h1>
        <p class="subtitle">血流的管道——血管 互动学习数据查看</p>
        <button class="refresh-btn" onclick="loadData()">刷新数据</button>
    </header>
    <div class="stats" id="stats">
        <div class="stat-card"><h3 id="total-submissions">0</h3><p>总提交数</p></div>
        <div class="stat-card"><h3 id="total-groups">0</h3><p>参与组数</p></div>
        <div class="stat-card"><h3 id="avg-score">0</h3><p>平均成绩</p></div>
        <div class="stat-card"><h3 id="highest-score">0</h3><p>最高成绩</p></div>
    </div>
    <div style="display: flex; justify-content: center; gap: 20px; margin: 30px 0;">
        <button onclick="loadData()" style="padding: 12px 25px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; cursor: pointer;">刷新数据</button>
        <button onclick="clearData()" style="padding: 12px 25px; background: #f44336; color: white; border: none; border-radius: 10px; cursor: pointer;">清空数据</button>
    </div>
    <div class="tab-container">
        <button class="tab-btn active" onclick="showTab('task2')">任务二：模型建构</button>
        <button class="tab-btn" onclick="showTab('task4')">任务四：生活应用</button>
        <button class="tab-btn" onclick="showTab('chart')">成绩图表</button>
    </div>
    <div id="task2" class="tab-content active">
        <div class="section">
            <h2>任务二：血管模型建构</h2>
            <div class="filter-bar">
                <select id="filter-task2"><option value="">全部组别</option></select>
                <button onclick="filterData('task2')">筛选</button>
            </div>
            <div class="data-grid" id="task2-grid"><div class="loading">正在加载数据...</div></div>
        </div>
    </div>
    <div id="task4" class="tab-content">
        <div class="section">
            <h2>任务四：生活应用</h2>
            <div class="filter-bar">
                <select id="filter-task4"><option value="">全部组别</option></select>
                <button onclick="filterData('task4')">筛选</button>
            </div>
            <div class="data-grid" id="task4-grid"><div class="loading">正在加载数据...</div></div>
        </div>
    </div>
    <div id="chart" class="tab-content">
        <div class="section"><h2>成绩分布图表</h2><div class="bar-chart" id="bar-chart"><div class="loading">正在加载数据...</div></div></div>
    </div>
</div>
<script>
    let allData = [];
    const correctAnswers = { q1:'C', q2:'B', q3:'B', q4:'D', q5:'B' };

    function showTab(id) {
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
        document.querySelector(`[onclick="showTab('${id}')"]`).classList.add('active');
        document.getElementById(id).classList.add('active');
    }

    async function loadData() {
        document.getElementById('task2-grid').innerHTML = '<div class="loading">加载中...</div>';
        document.getElementById('task4-grid').innerHTML = '<div class="loading">加载中...</div>';
        try {
            const res = await fetch('https://api.jsonbin.io/v3/b/69e48a5c36566621a8cbaf80/latest', {
                headers: { 'X-Master-Key': '$2a$10$2.ZmM3ApuOuW3fiS7Kmy7ururP8cX.HUk7.OV5eGjrsUta2gmEB0u' }
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const json = await res.json();
            const submissions = Array.isArray(json.record) ? json.record : [];
            allData = submissions;
            updateStats(submissions);
            populateFilters(submissions);
            renderTask2(submissions);
            renderTask4(submissions);
            renderChart(submissions);
        } catch (e) {
            document.getElementById('task2-grid').innerHTML = `<div class="error">加载失败: ${e.message}</div>`;
            document.getElementById('task4-grid').innerHTML = `<div class="error">加载失败: ${e.message}</div>`;
        }
    }

    function updateStats(data) {
        const total = data.length;
        const groups = new Set(data.map(d=>d.group||d.组别||'未知')).size;
        let sum=0, cnt=0, max=0;
        data.forEach(d=>{ const s=parseInt(d.score||d.评分||0); if(s>0){ sum+=s; cnt++; if(s>max) max=s; } });
        document.getElementById('total-submissions').textContent = total;
        document.getElementById('total-groups').textContent = groups;
        document.getElementById('avg-score').textContent = cnt ? (sum/cnt).toFixed(1) : 0;
        document.getElementById('highest-score').textContent = max;
    }

    function populateFilters(data) {
        const groups = [...new Set(data.map(d=>d.group||d.组别||'未知'))];
        const html = groups.map(g=>`<option value="${g}">${g}</option>`).join('');
        document.getElementById('filter-task2').innerHTML = '<option value="">全部组别</option>'+html;
        document.getElementById('filter-task4').innerHTML = '<option value="">全部组别</option>'+html;
    }

    function filterData(task) {
        const val = document.getElementById(`filter-${task}`).value;
        if(task==='task2') renderTask2(allData, val);
        else renderTask4(allData, val);
    }

    function renderTask2(data, filter='') {
        let filtered = data.filter(d => (d.task||d.任务||'').includes('任务二') || (d.task||d.任务||'').includes('模型'));
        if(filter) filtered = filtered.filter(d => (d.group||d.组别||'') === filter);
        const latest = {};
        filtered.forEach(d => { const g = d.group||d.组别||'未知'; const ts = d.timestamp||0; if(!latest[g]||ts>latest[g].timestamp) latest[g]=d; });
        const items = Object.values(latest);
        const grid = document.getElementById('task2-grid');
        if(!items.length) { grid.innerHTML='<div class="empty">暂无数据</div>'; return; }
        grid.innerHTML = items.map(d => {
            const group = d.group||d.组别||'未知';
            const score = d.score||d.评分||0;
            const time = d.time||d.时间||'';
            const img = d.image||d.图片||'';
            return `<div class="data-card">
                <div class="header"><span class="group">${group}</span><span class="task-type">模型建构</span></div>
                <div class="score">${score} <span>分</span></div><div class="time">${time}</div>
                ${img ? `<img src="${img}" alt="模型图" onclick="showImage('${img}')">` : ''}
            </div>`;
        }).join('');
    }

    function renderTask4(data, filter='') {
        let filtered = data.filter(d => (d.task||d.任务||'').includes('任务四') || (d.task||d.任务||'').includes('生活'));
        if(filter) filtered = filtered.filter(d => (d.group||d.组别||'') === filter);
        const latest = {};
        filtered.forEach(d => { const g = d.group||d.组别||'未知'; const ts = d.timestamp||0; if(!latest[g]||ts>latest[g].timestamp) latest[g]=d; });
        const items = Object.values(latest);
        const grid = document.getElementById('task4-grid');
        if(!items.length) { grid.innerHTML='<div class="empty">暂无数据</div>'; return; }
        grid.innerHTML = items.map(d => {
            const group = d.group||d.组别||'未知';
            const score = d.score||d.评分||0;
            const time = d.time||d.时间||'';
            let answers = d.answers||d.答题||{};
            if(typeof answers === 'string') try{answers=JSON.parse(answers);}catch(e){}
            let ansHtml = '';
            for(let i=1;i<=5;i++){ const a=answers[`q${i}`]||'-'; const correct = a===correctAnswers[`q${i}`]; ansHtml+=`<p class="${correct?'correct':'wrong'}">第${i}题: ${a} ${correct?'✓':'✗'}</p>`; }
            return `<div class="data-card"><div class="header"><span class="group">${group}</span><span class="task-type">生活应用</span></div>
                <div class="score">${score} <span>分</span></div><div class="time">${time}</div><div class="answers-list">${ansHtml}</div></div>`;
        }).join('');
    }

    function renderChart(data) {
        const groups = [...new Set(data.map(d=>d.group||d.组别||'未知'))];
        const scores = {};
        groups.forEach(g => { let sum=0,cnt=0; data.filter(d=>(d.group||d.组别||'')===g).forEach(d=>{ const s=parseInt(d.score||d.评分||0); if(s){sum+=s;cnt++;} }); scores[g]=cnt?Math.round(sum/cnt*10)/10:0; });
        const chart = document.getElementById('bar-chart');
        if(!Object.keys(scores).length) { chart.innerHTML='<div class="empty">暂无数据</div>'; return; }
        const max = Math.max(...Object.values(scores),10);
        chart.innerHTML = Object.entries(scores).map(([g,avg])=>`<div class="bar" style="height:${(avg/max)*150}px;"><span class="value">${avg}</span><span class="label">${g}</span></div>`).join('');
    }

    function clearData() {
        if(!confirm('确定清空所有数据？')) return;
        fetch('https://api.jsonbin.io/v3/b/69e48a5c36566621a8cbaf80', {
            method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': '$2a$10$2.ZmM3ApuOuW3fiS7Kmy7ururP8cX.HUk7.OV5eGjrsUta2gmEB0u' },
            body: JSON.stringify([])
        }).then(r=>r.ok?r.json():Promise.reject()).then(()=>{ alert('已清空'); loadData(); }).catch(e=>alert('清空失败'));
    }

    function showImage(src) {
        const modal = document.createElement('div');
        modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;justify-content:center;align-items:center;z-index:1000;cursor:pointer;';
        const img = document.createElement('img'); img.src=src; img.style.maxWidth='90%'; img.style.maxHeight='90%'; img.style.borderRadius='10px';
        modal.appendChild(img); modal.onclick=()=>document.body.removeChild(modal); document.body.appendChild(modal);
    }

    window.onload = loadData;
</script>
</body>
</html>
