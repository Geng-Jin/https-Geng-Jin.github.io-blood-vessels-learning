<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师端 - 血流的管道血管互动学习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.2em;
        }
        
        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 15px;
            transition: transform 0.3s ease;
        }
        
        .refresh-btn:hover {
            transform: scale(1.05);
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .stat-card h3 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 5px;
        }
        
        .stat-card p {
            color: #666;
            font-size: 0.9em;
        }
        
        .section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-bar select, .filter-bar input {
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
        }
        
        .filter-bar button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        
        .filter-bar button:hover {
            background: #764ba2;
        }
        
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .data-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #ddd;
            transition: all 0.3s ease;
        }
        
        .data-card:hover {
            border-color: #667eea;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }
        
        .data-card .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .data-card .group {
            font-weight: bold;
            font-size: 1.2em;
            color: #667eea;
        }
        
        .data-card .task-type {
            background: #667eea;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8em;
        }
        
        .data-card .score {
            font-size: 2em;
            font-weight: bold;
            color: #764ba2;
            text-align: center;
            margin: 15px 0;
        }
        
        .data-card .score span {
            font-size: 0.5em;
            color: #666;
        }
        
        .data-card .time {
            color: #666;
            font-size: 0.9em;
            text-align: center;
        }
        
        .data-card img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
            margin-top: 15px;
            display: block;
        }
        
        .answers-list {
            margin-top: 15px;
            padding: 10px;
            background: white;
            border-radius: 10px;
        }
        
        .answers-list p {
            margin: 5px 0;
            font-size: 0.9em;
        }
        
        .answers-list .correct {
            color: #4CAF50;
        }
        
        .answers-list .wrong {
            color: #f44336;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .error {
            text-align: center;
            padding: 40px;
            color: #f44336;
            background: #ffebee;
            border-radius: 15px;
        }
        
        .empty {
            text-align: center;
            padding: 40px;
            color: #666;
            background: #f5f5f5;
            border-radius: 15px;
        }
        
        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab-btn {
            background: #ddd;
            color: #333;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .chart-container {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 15px;
        }
        
        .bar-chart {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 20px;
            height: 200px;
            padding: 20px;
        }
        
        .bar {
            width: 60px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px 10px 0 0;
            position: relative;
            transition: height 0.5s ease;
        }
        
        .bar .value {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            color: #667eea;
        }
        
        .bar .label {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8em;
            white-space: nowrap;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .stats {
                grid-template-columns: 1fr 1fr;
            }
            
            .data-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>教师端后台</h1>
            <p class="subtitle">血流的管道——血管 互动学习数据查看</p>
            <button class="refresh-btn" onclick="loadData()">刷新数据</button>
        </header>
        
        <div class="stats" id="stats">
            <div class="stat-card">
                <h3 id="total-submissions">0</h3>
                <p>总提交数</p>
            </div>
            <div class="stat-card">
                <h3 id="total-groups">0</h3>
                <p>参与组数</p>
            </div>
            <div class="stat-card">
                <h3 id="avg-score">0</h3>
                <p>平均成绩</p>
            </div>
            <div class="stat-card">
                <h3 id="highest-score">0</h3>
                <p>最高成绩</p>
            </div>
        </div>
        
        <div class="tab-container">
            <button class="tab-btn active" onclick="showTab('task2')">任务二：模型建构</button>
            <button class="tab-btn" onclick="showTab('task4')">任务四：生活应用</button>
            <button class="tab-btn" onclick="showTab('chart')">成绩图表</button>
        </div>
        
        <div id="task2" class="tab-content active">
            <div class="section">
                <h2>任务二：血管模型建构</h2>
                <div class="filter-bar">
                    <select id="filter-task2">
                        <option value="">全部组别</option>
                    </select>
                    <button onclick="filterData('task2')">筛选</button>
                </div>
                <div class="data-grid" id="task2-grid">
                    <div class="loading">正在加载数据...</div>
                </div>
            </div>
        </div>
        
        <div id="task4" class="tab-content">
            <div class="section">
                <h2>任务四：生活应用</h2>
                <div class="filter-bar">
                    <select id="filter-task4">
                        <option value="">全部组别</option>
                    </select>
                    <button onclick="filterData('task4')">筛选</button>
                </div>
                <div class="data-grid" id="task4-grid">
                    <div class="loading">正在加载数据...</div>
                </div>
            </div>
        </div>
        
        <div id="chart" class="tab-content">
            <div class="section">
                <h2>成绩分布图表</h2>
                <div class="chart-container">
                    <div class="bar-chart" id="bar-chart">
                        <div class="loading">正在加载数据...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let allData = [];
        const correctAnswers = {
            q1: 'C',
            q2: 'B',
            q3: 'B',
            q4: 'D',
            q5: 'B'
        };

        function showTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            document.querySelector(`[onclick="showTab('${tabId}')"]`).classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        async function loadData() {
            const task2Grid = document.getElementById('task2-grid');
            const task4Grid = document.getElementById('task4-grid');
            const barChart = document.getElementById('bar-chart');

            task2Grid.innerHTML = '<div class="loading">正在加载数据...</div>';
            task4Grid.innerHTML = '<div class="loading">正在加载数据...</div>';
            barChart.innerHTML = '<div class="loading">正在加载数据...</div>';

            try {
                const response = await fetch('https://api.jsonbin.io/v3/b/69e48a5c36566621a8cbaf80/latest', {
                    headers: {
                        'X-Master-Key': '$2a$10$2.ZmM3ApuOuW3fiS7Kmy7ururP8cX.HUk7.OV5eGjrsUta2gmEB0u'
                    }
                });
                console.log('Response status:', response.status);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status} ${response.statusText}`);
                }

                const jsonData = await response.json();
                const data = jsonData.record || [];
                console.log('从JSONBin获取的数据:', data);

                // 确保data是数组
                const submissions = Array.isArray(data) ? data : (data.submissions || []);
                allData = submissions;

                updateStats(submissions);
                populateFilters(submissions);
                renderTask2(submissions);
                renderTask4(submissions);
                renderChart(submissions);
            } catch (error) {
                console.error('获取数据失败:', error);
                task2Grid.innerHTML = `<div class="error">获取数据失败：${error.message}<br>请检查网络连接或JSONBin配置</div>`;
                task4Grid.innerHTML = `<div class="error">获取数据失败：${error.message}<br>请检查网络连接或JSONBin配置</div>`;
                barChart.innerHTML = `<div class="error">获取数据失败：${error.message}<br>请检查网络连接或JSONBin配置</div>`;
            }
        }
        
        function updateStats(data) {
            const totalSubmissions = data.length;
            const groups = [...new Set(data.map(item => item.组别 || item.group || '未知'))];
            const totalGroups = groups.length;
            
            let totalScore = 0;
            let scoreCount = 0;
            let highestScore = 0;
            
            data.forEach(item => {
                const score = parseInt(item.评分 || item.score || 0);
                if (score > 0) {
                    totalScore += score;
                    scoreCount++;
                    if (score > highestScore) highestScore = score;
                }
            });
            
            const avgScore = scoreCount > 0 ? (totalScore / scoreCount).toFixed(1) : 0;
            
            document.getElementById('total-submissions').textContent = totalSubmissions;
            document.getElementById('total-groups').textContent = totalGroups;
            document.getElementById('avg-score').textContent = avgScore;
            document.getElementById('highest-score').textContent = highestScore;
        }
        
        function populateFilters(data) {
            const groups = [...new Set(data.map(item => item.组别 || item.group || '未知'))];
            
            const filterTask2 = document.getElementById('filter-task2');
            const filterTask4 = document.getElementById('filter-task4');
            
            filterTask2.innerHTML = '<option value="">全部组别</option>';
            filterTask4.innerHTML = '<option value="">全部组别</option>';
            
            groups.forEach(group => {
                filterTask2.innerHTML += `<option value="${group}">${group}</option>`;
                filterTask4.innerHTML += `<option value="${group}">${group}</option>`;
            });
        }
        
        function filterData(task) {
            const filterValue = document.getElementById(`filter-${task}`).value;
            
            if (task === 'task2') {
                renderTask2(allData, filterValue);
            } else if (task === 'task4') {
                renderTask4(allData, filterValue);
            }
        }
        
        function renderTask2(data, filter = '') {
            const grid = document.getElementById('task2-grid');
            
            let task2Data = data.filter(item => 
                (item.任务 || item.task || '') === '任务二：血管模型建构' ||
                (item.任务 || item.task || '').includes('模型')
            );
            
            if (filter) {
                task2Data = task2Data.filter(item => 
                    (item.组别 || item.group || '') === filter
                );
            }
            
            if (task2Data.length === 0) {
                grid.innerHTML = '<div class="empty">暂无数据</div>';
                return;
            }
            
            grid.innerHTML = task2Data.map(item => {
                const group = item.组别 || item.group || '未知';
                const score = item.评分 || item.score || 0;
                const time = item.时间 || item.time || '';
                const image = item.图片 || item.image || '';
                
                return `
                    <div class="data-card">
                        <div class="header">
                            <span class="group">${group}</span>
                            <span class="task-type">模型建构</span>
                        </div>
                        <div class="score">${score} <span>分</span></div>
                        <div class="time">${time}</div>
                        ${image ? `<img src="${image}" alt="模型图片">` : ''}
                    </div>
                `;
            }).join('');
        }
        
        function renderTask4(data, filter = '') {
            const grid = document.getElementById('task4-grid');
            
            let task4Data = data.filter(item => 
                (item.任务 || item.task || '') === '任务四：生活应用' ||
                (item.任务 || item.task || '').includes('生活')
            );
            
            if (filter) {
                task4Data = task4Data.filter(item => 
                    (item.组别 || item.group || '') === filter
                );
            }
            
            if (task4Data.length === 0) {
                grid.innerHTML = '<div class="empty">暂无数据</div>';
                return;
            }
            
            grid.innerHTML = task4Data.map(item => {
                const group = item.组别 || item.group || '未知';
                const score = item.评分 || item.score || 0;
                const time = item.时间 || item.time || '';
                let answers = {};
                
                try {
                    if (item.答题 || item.answers) {
                        answers = JSON.parse(item.答题 || item.answers);
                    }
                } catch (e) {}
                
                let answersHtml = '';
                for (let i = 1; i <= 5; i++) {
                    const qKey = `q${i}`;
                    const userAnswer = answers[qKey] || '-';
                    const isCorrect = userAnswer === correctAnswers[qKey];
                    answersHtml += `<p class="${isCorrect ? 'correct' : 'wrong'}">第${i}题: ${userAnswer} ${isCorrect ? '✓' : '✗'}</p>`;
                }
                
                return `
                    <div class="data-card">
                        <div class="header">
                            <span class="group">${group}</span>
                            <span class="task-type">生活应用</span>
                        </div>
                        <div class="score">${score} <span>分</span></div>
                        <div class="time">${time}</div>
                        <div class="answers-list">
                            ${answersHtml}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function renderChart(data) {
            const chart = document.getElementById('bar-chart');
            
            const groups = [...new Set(data.map(item => item.组别 || item.group || '未知'))];
            const groupScores = {};
            
            groups.forEach(group => {
                const groupData = data.filter(item => 
                    (item.组别 || item.group || '') === group
                );
                let totalScore = 0;
                let count = 0;
                groupData.forEach(item => {
                    const score = parseInt(item.评分 || item.score || 0);
                    if (score > 0) {
                        totalScore += score;
                        count++;
                    }
                });
                groupScores[group] = count > 0 ? Math.round(totalScore / count * 10) / 10 : 0;
            });
            
            const maxScore = Math.max(...Object.values(groupScores), 10);
            
            if (Object.keys(groupScores).length === 0) {
                chart.innerHTML = '<div class="empty">暂无数据</div>';
                return;
            }
            
            chart.innerHTML = Object.entries(groupScores).map(([group, avgScore]) => {
                const height = (avgScore / maxScore) * 150;
                return `
                    <div class="bar" style="height: ${height}px;">
                        <span class="value">${avgScore}</span>
                        <span class="label">${group}</span>
                    </div>
                `;
            }).join('');
        }
        
        window.onload = loadData;
    </script>
</body>
</html>
